name: Bug report
description: Something in Dropper behaves incorrectly (crash, wrong block/allow, install/uninstall, tray, DNS).
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. Dropper is a local DNS shield — please **do not** include private browsing history or anything sensitive from `block.log`. A few redacted lines are plenty.

        If a **legitimate domain was wrongly blocked**, use the *False-positive report* template instead.
  - type: input
    id: version
    attributes:
      label: Dropper version
      description: Output of `dropper --version`.
      placeholder: "dropper 0.1.5"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      description: v0.1 is Windows-only; other platforms are on the roadmap.
      options:
        - Windows 11
        - Windows 10
        - Windows Server
        - Other (note in description)
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe? Include the exact error code/message if Dropper printed one (e.g. E001 PORT_53_OCCUPIED).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics (optional)
      description: Paste relevant output of `dropper doctor` and/or a few redacted `block.log` lines. Code-fence it.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I've removed anything sensitive (private domains, tokens, paths).
          required: true
