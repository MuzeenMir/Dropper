name: Feature request
description: Suggest a capability or improvement for Dropper.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Dropper's north star is a calm, single-binary, zero-telemetry DNS shield. Requests that fit that shape land fastest. Open-ended ideas and "would you ever…" questions are a better fit for [Discussions](https://github.com/MuzeenMir/Dropper/discussions).
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What friction or gap are you hitting? Describe the situation, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: fit
    attributes:
      label: Fit
      options:
        - label: This keeps Dropper single-machine and zero-telemetry (no SaaS/cloud dependency).
          required: false
        - label: I searched existing issues and Discussions for this idea.
          required: true
