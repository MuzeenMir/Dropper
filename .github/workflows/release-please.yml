name: release-please

# Auto-generated changelog + release PR from Conventional Commits.
# Not a required status check — it only runs on push to main and opens a PR.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Config + manifest seed single-package release flow. Swap to
          # component paths under backend/* and frontend/* when monorepo
          # flatten (deferred past Phase 0 exit per GIT-RESTRUCTURE.md) lands.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
